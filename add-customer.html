<!DOCTYPE html>
<html lang="en">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Add Customer</title>

<style>
    .form-box{

    width:95%;
    max-width:500px;
    margin:30px auto;
    background:#fff;
    padding:25px;
    border-radius:15px;
    box-shadow:0 5px 15px rgba(0,0,0,.15);

}

.form-box label{

    display:block;
    margin-top:12px;
    margin-bottom:5px;
    font-weight:bold;

}

.form-box input{

    width:100%;
    padding:14px;
    margin-bottom:15px;
    border:1px solid #ccc;
    border-radius:8px;
    font-size:16px;

}

.save-btn{

    width:100%;
    padding:15px;
    background:#4CAF50;
    color:white;
    border:none;
    border-radius:8px;
    font-size:18px;
    cursor:pointer;

}

.location-btn{

    width:100%;

    padding:14px;

    margin-top:10px;

    margin-bottom:15px;

    border:none;

    border-radius:8px;

    background:#ff9800;

    color:white;

    font-size:17px;

    cursor:pointer;

}

.location-btn:hover{

    background:#f57c00;

}
</style>

</head>

<body>

<div class="top-bar">

    <button class="back-btn" onclick="history.back()">
        ⬅ Back
    </button>

    <h2>Add Customer</h2>

</div>

<!-- Form Start -->

<div class="form-box">

    <label>Serial Number</label>

    <input type="number"
           id="serialNo"
              placeholder="Serial Number">
        

    <label>Customer Name</label>

    <input type="text"
           id="customerName"
           placeholder="Customer Name">

    <label>W/o , S/o , D/o</label>

    <input type="text"
           id="relation"
           placeholder="W/o, S/o or D/o">

    <label>Village</label>

    <input type="text"
           id="village"
           placeholder="Village">

    <label>Phone Number</label>

    <input type="tel"
           id="phone"
           maxlength="10"
           placeholder="Phone Number">

    <label>Aadhaar Number</label>

    <input type="text"
           id="aadhar"
           maxlength="12"
           placeholder="Aadhaar Number">

    <label>Customer Photo</label>

<input
    type="file"
    id="customerPhoto"
    accept="image/*">

<label>Live Location</label>

<input
    type="text"
    id="location"
    placeholder="Click Get Location"
    >

<button
    type="button"
    class="location-btn"
    onclick="getLocation()">

    📍 Get Live Location

</button><br><br>


    <button class="save-btn"
            onclick="saveCustomer()">

        Save Customer

    </button>

</div>

<script type="module" src="customer.js"></script>

</body>

</html>
